version: '3.8'

services:
  # Base de datos MongoDB
  mongodb:
    image: mongo:6.0
    container_name: eventlog-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: eventlog
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./backend/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - eventlog-network

  # Backend Node.js
  backend:
    build: ./backend
    container_name: eventlog-backend
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/eventlog?authSource=admin
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      - mongodb
    networks:
      - eventlog-network

  # Frontend React
  frontend:
    build: ./frontend
    container_name: eventlog-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - eventlog-network

volumes:
  mongodb_data:
    driver: local

networks:
  eventlog-network:
    driver: bridge
